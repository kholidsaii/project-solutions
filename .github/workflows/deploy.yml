name: Auto Deploy to VPS

on:
  push:
    branches: [ "main" ]

# Flag ini tetap perlu sampai GitHub benar-benar mematikan Node 20 di Sept 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Update ke v4 (terbaru) - pastikan tetap pakai @v4
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        # Update appleboy ke v1.2.0 (versi terbaru yang sudah support Node 24)
        uses: appleboy/ssh-action@v1.2.0 
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /www/wwwroot/kerjapro.com/project-solutions/
            
            echo "--- STARTING DEPLOYMENT ---"
            
            # Reset & Pull
            git fetch origin main
            git reset --hard origin/main
            
            # Frontend
            cd frontend
            npm install
            rm -rf dist
            npm run build
            
            # Sync Assets & Hapus index.php bawaan Laravel
            rm -rf ../backend/public/assets
            rm -f ../backend/public/index.php
            cp -r dist/* ../backend/public/
            
            # Backend
            cd ../backend
            chmod -R 775 storage bootstrap/cache
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            
            # Fix Postgres Cache/Session
            php artisan cache:table || true
            php artisan session:table || true
            php artisan migrate --force

            # Optimize
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            echo "🚀 Project Solutions Berhasil di-Deploy!"