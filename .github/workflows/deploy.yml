name: Auto Deploy to VPS

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            # 1. PAKSA STOP KALAU ADA ERROR (CRITICAL)
            set -e 

            cd /www/wwwroot/kerjapro.com/project-solutions/
            
            echo "--- STARTING DEPLOYMENT ---"
            
            # 2. Sync Code
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Masak Frontend (Vite)
            cd frontend
            echo "Installing Frontend Dependencies..."
            npm install
            
            echo "Building Frontend..."
            rm -rf dist
            # Kita tambah || exit 1 agar kalau build gagal, script langsung stop
            npm run build || { echo 'Build failed! Check for empty Vue files or TS errors'; exit 1; }
            
            # 4. Sinkronisasi Aset
            echo "Syncing Assets to Backend..."
            rm -rf ../backend/public/assets
            # Hapus index.php bawaan laravel agar tidak menang lawan index.html
            rm -f ../backend/public/index.php 
            cp -r dist/* ../backend/public/
            
            # 5. Beresin Backend (Laravel)
            cd ../backend
            chmod -R 775 storage bootstrap/cache
            
            echo "Installing Composer Dependencies..."
            composer install --no-dev --optimize-autoloader
            
            echo "Running Migrations..."
            php artisan migrate --force
            
            # Perbaikan Tabel Cache & Session (Jaga-jaga agar login tidak error)
            # Perintah ini tidak akan error kalau tabel sudah ada karena pakai migrate
            php artisan cache:table || true 
            php artisan session:table || true
            php artisan migrate --force

            # Optimasi
            echo "Optimizing Laravel..."
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            echo "🚀 Project Solutions Berhasil di-Deploy dan Aktif!"