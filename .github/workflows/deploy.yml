script: |
            set -e
            
            # 1. LOAD NVM SECARA MANUAL & FORCE
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
                . "$NVM_DIR/nvm.sh"
                # Pakai versi node default yang terpasang di nvm
                nvm use --delete-prefix default || nvm use node
            fi

            # Backup: Tambahkan path bin nvm ke PATH secara manual jika nvm.sh gagal
            export PATH="$NVM_DIR/versions/node/$(nvm current 2>/dev/null || echo "default")/bin:$PATH:/usr/local/bin:/usr/bin:/bin"
            
            # Debugging: Biar kita tahu npm ada di mana
            which node || echo "Node not found"
            which npm || echo "NPM not found"
            
            cd /www/wwwroot/kerjapro.com/project-solutions/
            
            echo "--- STARTING DEPLOYMENT ---"
            
            # 2. GIT UPDATE
            git fetch origin main
            git reset --hard origin/main
            
            # 3. FRONTEND BUILD
            cd frontend
            # Gunakan jalur lengkap jika npm masih command not found
            npm install
            npm run build
            
            # 4. SYNC TO LARAVEL PUBLIC
            rm -rf ../backend/public/assets
            cp -r dist/* ../backend/public/
            
            # 5. BACKEND SETUP
            cd ../backend
            mkdir -p storage/framework/{sessions,views,cache}
            chmod -R 775 storage bootstrap/cache
            
            # Pastikan composer juga terbaca
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan optimize:clear
            
            echo "🚀 Project Solutions Berhasil di-Deploy!"